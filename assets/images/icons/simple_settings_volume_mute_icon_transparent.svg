<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
<title>simple settings volume mute transparent icon</title>
<desc>Transparent SVG icon for Cowlsly Simple Settings mute control.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="60%">
    <stop offset="0" stop-color="#17304d"/>
    <stop offset=".7" stop-color="#071321"/>
    <stop offset="1" stop-color="#020610" stop-opacity=".96"/>
  </radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff2a8"/>
    <stop offset=".5" stop-color="#d7a93d"/>
    <stop offset="1" stop-color="#815b18"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
