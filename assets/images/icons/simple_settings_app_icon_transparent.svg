<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
<title>simple settings app transparent icon</title>
<desc>Transparent SVG icon for the Cowlsly Simple Settings shared module.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="60%">
    <stop offset="0" stop-color="#17304d"/>
    <stop offset=".7" stop-color="#071321"/>
    <stop offset="1" stop-color="#020610" stop-opacity=".96"/>
  </radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff2a8"/>
    <stop offset=".5" stop-color="#d7a93d"/>
    <stop offset="1" stop-color="#815b18"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<circle cx="256" cy="256" r="190" fill="url(#bg)" stroke="url(#gold)" stroke-width="14" filter="url(#glow)"/>
<circle cx="256" cy="256" r="108" fill="none" stroke="#20f0ff" stroke-width="14"/>
<circle cx="256" cy="256" r="24" fill="url(#gold)"/>
<g fill="none" stroke="url(#gold)" stroke-width="22" stroke-linecap="round">
  <line x1="256" y1="108" x2="256" y2="148"/>
  <line x1="256" y1="364" x2="256" y2="404"/>
  <line x1="108" y1="256" x2="148" y2="256"/>
  <line x1="364" y1="256" x2="404" y2="256"/>
  <line x1="151" y1="151" x2="179" y2="179"/>
  <line x1="333" y1="333" x2="361" y2="361"/>
  <line x1="361" y1="151" x2="333" y2="179"/>
  <line x1="179" y1="333" x2="151" y2="361"/>
</g>
</svg>