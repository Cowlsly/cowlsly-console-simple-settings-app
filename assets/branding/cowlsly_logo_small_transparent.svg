<svg xmlns="http://www.w3.org/2000/svg" width="256" height="128" viewBox="0 0 256 128" role="img" aria-labelledby="title desc">
<title>Cowlsly Production small logo</title>
<desc>Compact cyberpunk Cowlsly Production badge for docs and README embedding.</desc>
<defs>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff2a8"/>
    <stop offset=".45" stop-color="#d7a93d"/>
    <stop offset="1" stop-color="#815b18"/>
  </linearGradient>
  <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f0f0f0"/>
    <stop offset="1" stop-color="#8a8f98"/>
  </linearGradient>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect x="8" y="16" width="240" height="96" rx="18" fill="#0a0a0c" stroke="url(#gold)" stroke-width="4" filter="url(#glow)"/>
<text x="128" y="58" text-anchor="middle" fill="url(#gold)" font-family="system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="3">COWLSLY</text>
<text x="128" y="86" text-anchor="middle" fill="url(#chrome)" font-family="system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="5">PRODUCTION</text>
<circle cx="36" cy="40" r="3" fill="#20f0ff" opacity=".9"/>
<circle cx="52" cy="34" r="2" fill="#20f0ff" opacity=".6"/>
<circle cx="220" cy="40" r="3" fill="#20f0ff" opacity=".9"/>
<circle cx="204" cy="34" r="2" fill="#20f0ff" opacity=".6"/>
</svg>