<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
<title>Cowlsly forever-turning cogs background</title>
<desc>Cyberpunk animated cog machine background for Cowlsly suite docs and UI. The gears turn forever.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0" stop-color="#17304d"/>
    <stop offset=".55" stop-color="#071321"/>
    <stop offset="1" stop-color="#020610"/>
  </radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff2a8"/>
    <stop offset=".5" stop-color="#d7a93d"/>
    <stop offset="1" stop-color="#815b18"/>
  </linearGradient>
  <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#d8dde6"/>
    <stop offset="1" stop-color="#5a6270"/>
  </linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect width="1920" height="1080" fill="url(#bg)"/>
<g opacity=".18" stroke="#20f0ff" stroke-width="1">
  <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
  <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
  <line x1="0" y1="900" x2="1920" y2="900"/><line x1="320" y1="0" x2="320" y2="1080"/>
  <line x1="640" y1="0" x2="640" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
  <line x1="1280" y1="0" x2="1280" y2="1080"/><line x1="1600" y1="0" x2="1600" y2="1080"/>
</g>
<g filter="url(#glow)">
  <g transform="translate(960 540)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="48s" repeatCount="indefinite"/>
      <circle r="220" fill="none" stroke="url(#chrome)" stroke-width="18"/>
      <circle r="170" fill="#081827" stroke="url(#gold)" stroke-width="10"/>
      <g stroke="url(#gold)" stroke-width="14" stroke-linecap="round">
        <line x1="0" y1="-190" x2="0" y2="-120"/><line x1="0" y1="120" x2="0" y2="190"/>
        <line x1="-190" y1="0" x2="-120" y2="0"/><line x1="120" y1="0" x2="190" y2="0"/>
        <line x1="-134" y1="-134" x2="-85" y2="-85"/><line x1="85" y1="85" x2="134" y2="134"/>
        <line x1="134" y1="-134" x2="85" y2="-85"/><line x1="-85" y1="85" x2="-134" y2="134"/>
      </g>
      <circle r="42" fill="#071321" stroke="#20f0ff" stroke-width="8"/>
    </g>
  </g>
  <g transform="translate(420 320)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="22s" repeatCount="indefinite"/>
      <circle r="120" fill="none" stroke="url(#chrome)" stroke-width="12"/>
      <circle r="88" fill="#081827" stroke="url(#gold)" stroke-width="8"/>
      <g stroke="#20f0ff" stroke-width="10" stroke-linecap="round">
        <line x1="0" y1="-102" x2="0" y2="-62"/><line x1="0" y1="62" x2="0" y2="102"/>
        <line x1="-102" y1="0" x2="-62" y2="0"/><line x1="62" y1="0" x2="102" y2="0"/>
      </g>
      <circle r="24" fill="#071321" stroke="url(#gold)" stroke-width="5"/>
    </g>
  </g>
  <g transform="translate(1500 760)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
      <circle r="150" fill="none" stroke="url(#chrome)" stroke-width="14"/>
      <circle r="110" fill="#081827" stroke="url(#gold)" stroke-width="9"/>
      <g stroke="url(#gold)" stroke-width="11" stroke-linecap="round">
        <line x1="0" y1="-128" x2="0" y2="-78"/><line x1="0" y1="78" x2="0" y2="128"/>
        <line x1="-128" y1="0" x2="-78" y2="0"/><line x1="78" y1="0" x2="128" y2="0"/>
        <line x1="-90" y1="-90" x2="-56" y2="-56"/><line x1="56" y1="56" x2="90" y2="90"/>
      </g>
      <circle r="30" fill="#071321" stroke="#20f0ff" stroke-width="6"/>
    </g>
  </g>
  <g transform="translate(260 820)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
      <circle r="70" fill="none" stroke="url(#chrome)" stroke-width="8"/>
      <circle r="50" fill="#081827" stroke="url(#gold)" stroke-width="6"/>
      <g stroke="#20f0ff" stroke-width="7" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-34"/><line x1="0" y1="34" x2="0" y2="58"/>
        <line x1="-58" y1="0" x2="-34" y2="0"/><line x1="34" y1="0" x2="58" y2="0"/>
      </g>
      <circle r="14" fill="#071321" stroke="url(#gold)" stroke-width="4"/>
    </g>
  </g>
  <g transform="translate(1680 260)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="26s" repeatCount="indefinite"/>
      <circle r="95" fill="none" stroke="url(#chrome)" stroke-width="10"/>
      <circle r="68" fill="#081827" stroke="url(#gold)" stroke-width="7"/>
      <g stroke="url(#gold)" stroke-width="8" stroke-linecap="round">
        <line x1="0" y1="-80" x2="0" y2="-48"/><line x1="0" y1="48" x2="0" y2="80"/>
        <line x1="-80" y1="0" x2="-48" y2="0"/><line x1="48" y1="0" x2="80" y2="0"/>
      </g>
      <circle r="18" fill="#071321" stroke="#20f0ff" stroke-width="5"/>
    </g>
  </g>
</g>
<rect width="1920" height="1080" fill="#020610" opacity=".42"/>
</svg>