name: Verify repository consolidation into root

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-repository-consolidation-root
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out root with complete history
        uses: actions/checkout@v4
        with:
          ref: root
          fetch-depth: 0

      - name: Fetch all branch tips
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Verify branch tips are safely contained
        run: |
          python - <<'PY'
          import subprocess
          refs = subprocess.run(
              ['git', 'for-each-ref', '--format=%(refname:strip=3)', 'refs/remotes/origin'],
              check=True, text=True, capture_output=True,
          ).stdout.splitlines()
          branches = sorted({name for name in refs if name and name not in {'HEAD', 'root'}})
          failures = []
          for branch in branches:
              ref = f'refs/remotes/origin/{branch}'
              tip = subprocess.run(['git', 'rev-parse', ref], check=True, text=True, capture_output=True).stdout.strip()
              contained = subprocess.run(['git', 'merge-base', '--is-ancestor', tip, 'HEAD']).returncode == 0
              print(f'{branch}: {tip} contained={contained}')
              if not contained:
                  failures.append(branch)
          if failures:
              raise SystemExit('Uncontained branch tips: ' + ', '.join(failures))
          print('All remaining branch tips are contained in root. No branches were changed or deleted.')
          PY
